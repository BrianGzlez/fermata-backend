name: Sync Bus Data

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger
    inputs:
      test_mode:
        description: 'Run in test mode (only 2 routes)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run data sync (test mode)
      if: github.event.inputs.test_mode == 'true'
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python sync_data.py --test
    
    - name: Run data sync (full)
      if: github.event.inputs.test_mode != 'true'
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        python sync_data.py --all
    
    - name: Notify completion
      if: success()
      run: echo "✅ Data sync completed successfully"
    
    - name: Notify failure
      if: failure()
      run: echo "❌ Data sync failed"
