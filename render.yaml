services:
  - type: web
    name: fermati-backend
    env: python
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LOG_LEVEL
        value: INFO
      - key: CACHE_SIZE
        value: 100
      - key: REQUEST_TIMEOUT
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: fermati-db
          property: connectionString
  
  - type: cron
    name: fermati-sync
    env: python
    runtime: python
    region: oregon
    schedule: "0 2 * * 0"  # Every Sunday at 2 AM
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python sync_data.py --all
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: fermati-db
          property: connectionString

databases:
  - name: fermati-db
    databaseName: fermati
    user: fermati
    plan: free
